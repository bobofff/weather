<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Polymarket 天气组合锁利</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" aria-label="主菜单">
        <a class="brand" href="#top">
          <span class="brand-mark">WQ</span>
          <span>
            <strong>天气锁利</strong>
            <small>Weather Quant</small>
          </span>
        </a>
        <nav class="side-menu">
          <a class="active" href="#market-panel">盘口配置</a>
          <a href="/cities.html">城市配置</a>
          <a href="#ensemble-panel">Ensemble</a>
          <a href="#signal-panel">信号评分</a>
          <a href="#paper-panel">虚拟盘</a>
          <a href="#model-competition-panel">模型竞赛</a>
          <a href="#llm-panel">AI 解读</a>
          <a href="#history-panel">历史记录</a>
          <a href="#weather-market-panel">天气盘口</a>
          <a href="#risk-panel">风控参数</a>
        </nav>
      </aside>

      <main id="top" class="shell">
      <header class="topbar">
        <div>
          <h1>Polymarket 天气组合锁利</h1>
          <p>多桶 YES 持仓、可清算价值、分批退出和核心区间 hedge lock。</p>
        </div>
      </header>

      <section id="market-panel" class="panel">
        <h2>Polymarket 盘口</h2>
        <div class="market-grid">
          <label>Slug
            <input id="marketSlug" type="text" autocomplete="off" placeholder="精确 market slug">
          </label>
          <label>Condition ID
            <input id="conditionId" type="text" autocomplete="off" placeholder="0x...">
          </label>
          <label>城市
            <select id="citySelect">
              <option value="munich" data-unit="C">Munich</option>
            </select>
          </label>
          <label class="wide">关键词覆盖（可选）
            <input id="marketQuery" type="text" autocomplete="off" placeholder="留空则使用所选城市">
          </label>
          <label>日期
            <input id="targetDate" type="date">
          </label>
          <label>类型
            <select id="temperatureKind">
              <option value="high">最高温</option>
              <option value="low">最低温</option>
            </select>
          </label>
          <label class="checkbox-row">
            <input id="includeOrderbooks" type="checkbox" checked>
            CLOB 盘口
          </label>
          <button id="fetchMarketButton" type="button">获取盘口</button>
        </div>
      </section>

      <section id="notice" class="notice" hidden></section>

      <section id="ensemble-panel" class="panel">
        <h2>Ensemble Probability</h2>
        <div class="market-grid">
          <label>Ensemble
            <select id="ensembleModel">
              <option value="ecmwf_aifs025" selected>ECMWF AIFS Ensemble 0.25</option>
              <option value="ecmwf_ifs025">ECMWF IFS Ensemble 0.25</option>
              <option value="gfs_seamless">GFS Ensemble Seamless</option>
            </select>
          </label>
          <label>最小 Edge
            <input id="minEdge" type="number" min="0" max="1" step="0.001" value="0.03">
          </label>
          <label class="checkbox-row">
            <input id="saveSqlite" type="checkbox">
            保存 SQLite
          </label>
          <button id="fetchEnsembleButton" type="button">获取 Ensemble</button>
          <button id="fetchEnsembleSignalButton" type="button">Ensemble Signal</button>
        </div>
        <div id="ensembleProbability"></div>
      </section>

      <section id="signal-panel" class="panel">
        <h2>信号评分</h2>
        <div id="signalScore"></div>
      </section>

      <section id="paper-panel" class="panel">
        <div class="panel-head">
          <h2>虚拟盘买入</h2>
          <div class="button-row">
            <button id="paperPreviewButton" class="secondary" type="button">预览虚拟买入</button>
            <button id="paperBuyButton" type="button">虚拟买入最佳 BUY_YES</button>
            <button id="paperMarkButton" class="secondary" type="button">刷新持仓盘口</button>
            <button id="paperMonitorStartButton" class="secondary" type="button">启动轮询</button>
            <button id="paperMonitorStopButton" class="secondary" type="button">停止轮询</button>
            <button id="paperHedgePreviewButton" class="secondary" type="button">Hedge preview</button>
            <button id="paperReconcileButton" class="secondary" type="button">结算虚拟盘</button>
          </div>
        </div>
        <div class="compact-grid paper-controls">
          <label>Stake（留空=Kelly）
            <input id="paperStake" type="number" min="0" step="1" placeholder="Kelly">
          </label>
          <label>最大 spread
            <input id="paperMaxSpread" type="number" min="0" max="1" step="0.001" value="0.12">
          </label>
          <label>市场暴露上限
            <input id="paperMaxMarketExposure" type="number" min="0" step="1" value="100">
          </label>
          <label>城市日期暴露
            <input id="paperMaxCityDateExposure" type="number" min="0" step="1" value="200">
          </label>
          <label>最小 ask 深度
            <input id="paperMinAskDepth" type="number" min="0" step="1" value="1">
          </label>
          <label>账户初始资金
            <input id="paperInitialCash" type="number" min="0" step="10" value="1000">
          </label>
          <label>轮询间隔 ms
            <input id="paperMonitorIntervalMs" type="number" min="60000" step="60000" value="60000">
          </label>
          <label>锁利触发价差
            <input id="paperTargetProfit" type="number" step="0.01" value="0.10">
          </label>
          <label>最小 cashout
            <input id="paperMinCashoutRatio" type="number" min="0" max="1" step="0.001" value="0.50">
          </label>
        </div>
        <div id="paperMonitorStatus"></div>
        <div id="paperSummary"></div>
        <div class="history-grid">
          <div id="paperPreview"></div>
          <div id="paperHedgePreview"></div>
          <div id="paperOrders"></div>
          <div id="paperPositions"></div>
          <div id="paperMarks"></div>
        </div>
      </section>

      <section id="model-competition-panel" class="panel">
        <div class="panel-head">
          <h2>模型竞赛虚拟盘</h2>
          <div class="button-row">
            <button id="runModelCompetitionButton" type="button">运行模型竞赛</button>
            <button id="refreshModelCompetitionStatsButton" class="secondary" type="button">刷新模型竞赛统计</button>
          </div>
        </div>
        <p class="muted">各模型使用独立虚拟账户与相同风控参数；只对 BUY_YES 候选落单。</p>
        <div class="compact-grid paper-controls">
          <label>模型（多选）
            <select id="competitionModels" multiple size="3">
              <option value="ecmwf_aifs025" selected>ECMWF AIFS Ensemble 0.25</option>
              <option value="ecmwf_ifs025" selected>ECMWF IFS Ensemble 0.25</option>
              <option value="gfs_seamless" selected>GFS Ensemble Seamless</option>
            </select>
          </label>
          <label>城市（多选）
            <select id="competitionCities" multiple size="3"></select>
          </label>
          <label>Stake（留空=Kelly）
            <input id="competitionStake" type="number" min="0" step="1" placeholder="沿用虚拟盘">
          </label>
        </div>
        <div class="history-grid">
          <div id="modelCompetitionResults"></div>
          <div id="modelCompetitionLeaderboard"></div>
          <div id="modelCompetitionCityLeaderboard"></div>
        </div>
      </section>

      <section id="llm-panel" class="panel">
        <div class="panel-head">
          <h2>AI 解读</h2>
          <div class="button-row">
            <button id="explainSignalButton" class="secondary" type="button" disabled>解读信号</button>
          </div>
        </div>
        <div id="llmSummary" class="llm-summary"></div>
      </section>

      <section id="history-panel" class="panel">
        <div class="panel-head">
          <h2>历史记录</h2>
          <div class="button-row">
            <button id="importSettlementButton" class="secondary" type="button">导入结算</button>
            <button id="reconcileSignalsButton" class="secondary" type="button">重新匹配</button>
          </div>
        </div>
        <div id="calibrationSummary"></div>
        <div class="history-grid">
          <div id="recentSettlements"></div>
          <div id="recentOutcomes"></div>
          <div id="recentRuns"></div>
          <div id="recentProbabilities"></div>
        </div>
      </section>

      <section id="weather-market-panel" class="panel">
        <h2>天气盘口</h2>
        <div id="markets"></div>
      </section>

      <section id="risk-panel" class="panel compact-grid">
        <label>单位
          <select id="unit">
            <option value="F">F</option>
            <option value="C">C</option>
          </select>
        </label>
        <label>Taker 费率 <input id="feeRate" type="number" min="0" max="1" step="0.001" value="0.05"></label>
        <label>最小 cashout <input id="minCashoutRatio" type="number" min="0" max="1" step="0.001" value="0.50"></label>
        <label>目标锁利 <input id="targetProfit" type="number" step="0.01" value="0"></label>
        <label>核心概率阈值 <input id="tailProbabilityCutoff" type="number" min="0" max="1" step="0.001" value="0.05"></label>
        <label>最大尾部概率 <input id="maxTailProbability" type="number" min="0" max="1" step="0.001" value="0.10"></label>
      </section>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
